<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login Signup</title>
    <link rel="stylesheet" href="./form-validation.css">
    

</head>

<body>
    <!-- side view animation circle -->
    <div class="circle1"></div>
    <div class="circle2"></div>

    <div class="container">
        <h1 id="title">Login</h1>
        <div id="login-box">
            <!-- Used the Input form -->
            <input type="email" id="login-email" placeholder="Enter Email">
            <input type="password" id="login-password" placeholder="Enter Password">

            <!-- butto click in login page -->
            <button onclick="loginUser()"> Login </button>
          
            <!-- show login => hidden signup -->
            <p>
                Don't have account ?
                <span onclick="showSignup()">Signup</span>
            </p>
        </div>

        <!-- signup of input box -->
        <div id="signup-box">
            <input type="text" id="signup-username" placeholder="Enter Username">
            <input type="email" id="signup-email" placeholder="Enter Email">
            <input type="password" id="signup-password" placeholder="Enter Password">
            <button onclick="signupUser()">Signup </button>
            <p>
            <!-- show signup => hidden login -->
                Already have account ?
                <span onclick="showLogin()">
                    Login
                </span>
            </p>
        </div>
        <!-- Error messagr -->
        <h3 id="message"></h3>
    </div>

    <script src="./form-validtion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</body>

</html>
